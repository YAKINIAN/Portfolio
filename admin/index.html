<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Yak Portfolio</title>
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.2.0/css/line.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        :root {
            --skin-color: hsl(342, 92%, 46%);
            --body-color: hsl(242, 19%, 5%);
            --box-color: hsl(242, 14%, 10%);
            --title-color: hsl(242, 8%, 95%);
            --text-color: hsl(242, 8%, 75%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--body-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background particles */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        .bg span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: var(--skin-color);
            animation: float 25s linear infinite;
            bottom: -150px;
            border-radius: 4px;
            opacity: 0;
        }
        .bg span:nth-child(1)  { left:  5%; width:10px; height:10px; animation-delay: 0s;   animation-duration:16s; }
        .bg span:nth-child(2)  { left: 15%; width:20px; height:20px; animation-delay: 2s;   animation-duration:20s; }
        .bg span:nth-child(3)  { left: 25%; width: 8px; height: 8px; animation-delay: 4s;   animation-duration:18s; }
        .bg span:nth-child(4)  { left: 40%; width:15px; height:15px; animation-delay: 0s;   animation-duration:22s; }
        .bg span:nth-child(5)  { left: 55%; width:25px; height:25px; animation-delay: 3s;   animation-duration:15s; }
        .bg span:nth-child(6)  { left: 65%; width:12px; height:12px; animation-delay: 6s;   animation-duration:19s; }
        .bg span:nth-child(7)  { left: 75%; width:18px; height:18px; animation-delay: 1s;   animation-duration:23s; }
        .bg span:nth-child(8)  { left: 85%; width: 6px; height: 6px; animation-delay: 5s;   animation-duration:17s; }
        .bg span:nth-child(9)  { left: 90%; width:22px; height:22px; animation-delay: 8s;   animation-duration:21s; }
        .bg span:nth-child(10) { left: 95%; width:14px; height:14px; animation-delay: 2s;   animation-duration:14s; }

        @keyframes float {
            0%   { transform: translateY(0) rotate(0deg);   opacity: .4; }
            100% { transform: translateY(-110vh) rotate(720deg); opacity: 0; }
        }

        .login_card {
            position: relative;
            z-index: 1;
            background: var(--box-color);
            border: 1px solid hsl(242, 14%, 18%);
            border-radius: 1rem;
            padding: 3rem 2.5rem;
            width: 400px;
            animation: slideUp .6s cubic-bezier(.16,1,.3,1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login_logo {
            display: flex;
            align-items: center;
            column-gap: .75rem;
            margin-bottom: 2rem;
        }
        .login_logo-badge {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--skin-color);
            display: grid;
            place-items: center;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }
        .login_logo-text { font-size: 1.25rem; font-weight: 600; color: var(--title-color); }
        .login_logo-sub  { font-size: .75rem; }

        h2 { font-size: 1.5rem; color: var(--title-color); margin-bottom: .25rem; }
        .login_subtitle { font-size: .875rem; margin-bottom: 2rem; }

        .field {
            margin-bottom: 1.25rem;
        }
        .field label {
            display: block;
            font-size: .813rem;
            margin-bottom: .4rem;
            color: var(--title-color);
        }
        .field_wrap {
            position: relative;
        }
        .field_wrap i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            color: var(--text-color);
            transition: color .3s;
        }
        .field_wrap input {
            width: 100%;
            background: var(--body-color);
            border: 2px solid hsl(242, 14%, 18%);
            border-radius: .5rem;
            padding: .75rem 1rem .75rem 2.75rem;
            color: var(--title-color);
            font-family: 'Poppins', sans-serif;
            font-size: .938rem;
            transition: border-color .3s;
        }
        .field_wrap input:focus { border-color: var(--skin-color); outline: none; }
        .field_wrap input:focus + i,
        .field_wrap:focus-within i { color: var(--skin-color); }

        /* icon is after input in DOM — use sibling trick differently */
        .field_wrap { display: flex; align-items: center; }
        .field_wrap input { order: 2; padding-left: 2.75rem; }
        .field_wrap i { order: 1; position: absolute; left: 1rem; pointer-events: none; }

        .btn {
            width: 100%;
            padding: .85rem;
            background: var(--skin-color);
            color: #fff;
            border: none;
            border-radius: .5rem;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: background .3s;
            margin-top: .5rem;
        }
        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,.15);
            transform: translateX(-100%);
            transition: transform .4s;
        }
        .btn:hover::after { transform: translateX(0); }
        .btn:active { transform: scale(.98); }

        .error {
            background: hsl(342, 60%, 15%);
            border: 1px solid var(--skin-color);
            border-radius: .4rem;
            padding: .6rem 1rem;
            font-size: .813rem;
            color: hsl(342, 80%, 75%);
            margin-bottom: 1rem;
            display: none;
        }
        .error.show { display: block; animation: shake .4s; }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25%      { transform: translateX(-8px); }
            75%      { transform: translateX(8px); }
        }

        .spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="login_card">
        <div class="login_logo">
            <div class="login_logo-badge">Yak</div>
            <div>
                <div class="login_logo-text">Portfolio CMS</div>
                <div class="login_logo-sub">Admin Panel</div>
            </div>
        </div>

        <h2>Welcome back</h2>
        <p class="login_subtitle">Sign in to manage your portfolio</p>

        <div class="error" id="error-msg"></div>

        <form id="login-form">
            <div class="field">
                <label>Username</label>
                <div class="field_wrap">
                    <input type="text" id="username" placeholder="admin" autocomplete="username" required>
                    <i class="uil uil-user"></i>
                </div>
            </div>

            <div class="field">
                <label>Password</label>
                <div class="field_wrap">
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                    <i class="uil uil-lock"></i>
                </div>
            </div>

            <button type="submit" class="btn" id="login-btn">
                <span id="btn-text">Sign In</span>
                <div class="spinner" id="spinner"></div>
            </button>
        </form>
    </div>

    <script>
        // Redirect if already logged in
        if (localStorage.getItem('cms_token')) location.href = 'dashboard.html';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const text = document.getElementById('btn-text');
            const spinner = document.getElementById('spinner');
            const errorEl = document.getElementById('error-msg');

            text.style.display = 'none';
            spinner.style.display = 'block';
            errorEl.classList.remove('show');

            try {
                const res = await fetch('https://portfolio-production-a8ef.up.railway.app/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Login failed');
                localStorage.setItem('cms_token', data.token);
                location.href = 'dashboard.html';
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.classList.add('show');
                text.style.display = 'block';
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
